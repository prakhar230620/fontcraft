<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow border -->
  <rect x="2" y="2" width="508" height="508" rx="110" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.3"/>
  <!-- FontCraft "F" letter mark - bold, clean typography -->
  <g filter="url(#glow)">
    <!-- Main F shape -->
    <rect x="148" y="140" width="56" height="232" rx="8" fill="url(#iconGrad)"/>
    <!-- Top horizontal bar -->
    <rect x="148" y="140" width="216" height="52" rx="8" fill="url(#iconGrad)"/>
    <!-- Middle horizontal bar -->
    <rect x="148" y="230" width="168" height="48" rx="8" fill="url(#iconGrad)"/>
  </g>
  <!-- Small decorative dot (craft element) -->
  <circle cx="382" cy="342" r="22" fill="url(#iconGrad)" opacity="0.85"/>
</svg>